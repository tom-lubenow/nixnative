name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS not currently supported (nix-ninja dependency)
          # - os: macos-latest
          #   system: aarch64-darwin
          - os: ubuntu-latest
            system: x86_64-linux

    runs-on: ${{ matrix.os }}
    name: nix flake check (${{ matrix.system }})

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.NIX_NINJA_DEPLOY_KEY }}

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes ca-derivations dynamic-derivations

      - uses: DeterminateSystems/flakehub-cache-action@v2

      - uses: nicknovitski/nix-develop@v1
        with:
          arguments: --accept-flake-config

      # Evaluation-only checks - full builds require recursive-nix daemon support
      # which isn't reliably available in standard CI environments.
      # Dynamic derivations (RFC 92) are still experimental.
      - name: Run flake check (eval only)
        run: nix flake check --no-build

      - name: Test example flakes (eval only)
        run: nu check-examples.nu --no-build
