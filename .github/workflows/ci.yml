name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            system: aarch64-darwin
          - os: ubuntu-latest
            system: x86_64-linux

    runs-on: ${{ matrix.os }}
    name: nix flake check (${{ matrix.system }})

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes ca-derivations

      - uses: DeterminateSystems/flakehub-cache-action@v2

      - uses: nicknovitski/nix-develop@v1
        with:
          arguments: --accept-flake-config

      - name: Run flake check
        run: nix flake check

      - name: Test example flakes
        run: nu check-examples.nu
